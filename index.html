<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Projects — BuelvasWeb</title>
  <link rel="canonical" href="https://buelvasweb.com/projects.html">
  <meta name="description" content="All projects by Esdras Buelvas: web apps, AI, writing, and more." />
  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg" type="image/svg+xml" />
  <meta property="og:title" content="Projects — BuelvasWeb" />
  <meta property="og:description" content="Explore every project: Spots, CoffeeShop, Playlist Constructor, BuelvasWeb, Lucien, Bushido, essays, and more." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://buelvasweb.com/projects.html" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Projects — BuelvasWeb" />
  <meta name="twitter:description" content="All projects by Esdras Buelvas." />
  <style>
    :root{--bg-dark:#0b0f1a;--bg-dark-img:url('https://i.imgur.com/pUrhAdr.png');--bg-light:#f6f7fb;--text-dark:#fff;--text-light:#1d2333;--panel-dark:rgba(255,255,255,.06);--panel-light:#ffffff;--muted:#9aa3b2;--accent:#3aa0ff;--chip:#2c3346;--chip-light:#eef2ff}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%;font-family:"Segoe UI",system-ui,-apple-system,Arial,sans-serif;background:var(--bg-dark-img) no-repeat center/cover;color:var(--text-dark)}
    body.light{background:var(--bg-light);color:var(--text-light)}
    a{color:inherit;text-decoration:none}
    .wrap{max-width:1100px;margin:40px auto;padding:0 20px;position:relative;z-index:1}
    .topbar{display:flex;gap:16px;align-items:center;justify-content:space-between;margin-bottom:24px}
    .brand{display:flex;align-items:center;gap:10px;font-weight:700}
    .brand img{width:28px;height:28px}
    .nav{display:flex;gap:14px}
    .nav a{opacity:.85}
    .nav a:hover{opacity:1}
    .toggle{background:none;border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:8px 10px;cursor:pointer}
    body.light .toggle{border-color:rgba(0,0,0,.1)}
    .panel{background:var(--panel-dark);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:18px}
    body.light .panel{background:var(--panel-light);border-color:rgba(0,0,0,.08)}
    .controls{display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:18px}
    .search{display:flex;gap:10px}
    .search input{flex:1;background:#0e1425;border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:12px 14px;color:#fff}
    body.light .search input{background:#fff;border-color:rgba(0,0,0,.1);color:#1d2333}
    .chips{display:flex;flex-wrap:wrap;gap:8px}
    .chip{font-size:.9rem;padding:8px 12px;border-radius:999px;background:var(--chip);border:1px solid rgba(255,255,255,.12);cursor:pointer;user-select:none}
    .chip.active{outline:2px solid var(--accent)}
    body.light .chip{background:var(--chip-light);border-color:rgba(0,0,0,.08)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
    .card{display:flex;flex-direction:column;gap:10px;padding:18px}
    .title{font-weight:700;font-size:1.05rem;line-height:1.2}
    .meta{display:flex;flex-wrap:wrap;gap:8px}
    .tag{font-size:.75rem;padding:6px 10px;border-radius:999px;background:#141a2c;border:1px solid rgba(255,255,255,.12);opacity:.9}
    body.light .tag{background:#f2f3f9;border-color:rgba(0,0,0,.08)}
    .desc{font-size:.92rem;opacity:.9}
    .row{display:flex;gap:10px;margin-top:auto}
    .btn{flex:1;text-align:center;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:transparent}
    .btn.primary{background:var(--accent);border-color:transparent;color:#091022;font-weight:700}
    .empty{opacity:.7;padding:24px;text-align:center}
    .footer{opacity:.7;text-align:center;margin:26px 0}
    @media (min-width:760px){.controls{grid-template-columns:1fr auto}}
    #particles-wrap{position:fixed;inset:0;z-index:0;pointer-events:none}
    #particles{width:100%;height:100%;display:block}
  </style>
</head>
<body>
  <div id="particles-wrap"><canvas id="particles"></canvas></div>
  <div class="wrap">
    <div class="topbar">
      <div class="brand"><img src="https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg" alt=""> <a href="/">BuelvasWeb</a></div>
      <div class="nav"><a href="/">Home</a><a href="/projects.html">Projects</a><a href="#" id="mode" class="toggle">🌙</a></div>
    </div>

    <div class="panel controls">
      <div class="search"><input id="q" type="search" placeholder="Search by name, tag, or stack" aria-label="Search projects"></div>
      <div class="chips" id="chips">
        <div class="chip active" data-filter="all">All</div>
        <div class="chip" data-filter="web">Web</div>
        <div class="chip" data-filter="ai">AI</div>
        <div class="chip" data-filter="writing">Writing</div>
        <div class="chip" data-filter="design">Design</div>
        <div class="chip" data-filter="other">Other</div>
      </div>
    </div>

    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" hidden>No matches. Try different filters or search terms.</div>

    <div class="footer">© 2025 Esdras Buelvas</div>
  </div>

  <script>
    const data=[
      {name:"BuelvasWeb",type:"web",desc:"This site. Fast single-file builds, SEO, and clean UI.",tags:["HTML","CSS","JS","SEO"],link:"https://buelvasweb.com",code:"https://github.com/dras8u"},
      {name:"Spots (TripleTen)",type:"web",desc:"Interactive photo cards with like/save and modals.",tags:["HTML","CSS","JS","BEM"],link:"https://github.com/dras8u/se_project_spots",code:"https://github.com/dras8u/se_project_spots"},
      {name:"CoffeeShop (TripleTen)",type:"web",desc:"Responsive marketing page with precise brief fidelity.",tags:["HTML","CSS","Layout"],link:"https://github.com/dras8u/se_project_coffeeshop",code:"https://github.com/dras8u/se_project_coffeeshop"},
      {name:"Playlist Constructor",type:"web",desc:"Vanilla JS playlist builder with templates and forms.",tags:["JS","DOM","Forms"],link:"https://github.com/Isa4444/esdrasweb",code:"https://github.com/Isa4444/esdrasweb"},
      {name:"Lucien (AI)",type:"ai",desc:"Personal AI assistant concept and tooling.",tags:["AI","Prompting","Agents"],link:"",code:""},
      {name:"BuelvasEscape",type:"other",desc:"Hospitality/brand concept and site work-in-progress.",tags:["Biz","Web"],link:"https://github.com/dras8u/BuelvasEscape",code:"https://github.com/dras8u/BuelvasEscape"},
      {name:"The Glitch That Thinks",type:"writing",desc:"Philosophical essay on consciousness (2025).",tags:["Essay","Philosophy"],link:"https://medium.com/@esdras-buelvas/the-glitch-that-thinks-522a3e8c1e74",code:""},
      {name:"The Unwritten Book of Bushido",type:"writing",desc:"Long-form fiction project.",tags:["Fiction","Worldbuilding"],link:"",code:""},
      {name:"EsdrasWeb (portfolio repo)",type:"web",desc:"Experiments and site scaffolds.",tags:["HTML","CSS","JS"],link:"https://github.com/Isa4444/esdrasweb",code:"https://github.com/Isa4444/esdrasweb"},
      {name:"Voice Assistant Proto",type:"ai",desc:"Wake-word and intent sketches.",tags:["Python","NLP"],link:"",code:""}
    ]

    const grid=document.getElementById('grid')
    const q=document.getElementById('q')
    const chips=document.getElementById('chips')
    const empty=document.getElementById('empty')
    const mode=document.getElementById('mode')

    function loadMode(){const m=localStorage.getItem('mode')||'dark';if(m==='light')document.body.classList.add('light');mode.textContent=m==='light'?'🌙':'☀️'}
    function toggleMode(){const light=document.body.classList.toggle('light');localStorage.setItem('mode',light?'light':'dark');mode.textContent=light?'🌙':'☀️'}

    function card(p){
      const tags=p.tags.map(t=>`<span class='tag'>${t}</span>`).join(' ')
      const live=p.link?`<a class='btn primary' href='${p.link}' target='_blank' rel='noopener'>Live</a>`:''
      const src=p.code?`<a class='btn' href='${p.code}' target='_blank' rel='noopener'>Code</a>`:''
      return `<div class='panel card' data-type='${p.type}' data-text='${(p.name+' '+p.desc+' '+p.tags.join(' ')).toLowerCase()}'>
        <div class='title'>${p.name}</div>
        <div class='desc'>${p.desc}</div>
        <div class='meta'>${tags}</div>
        <div class='row'>${live}${src}</div>
      </div>`
    }

    function render(list){grid.innerHTML=list.map(card).join('');empty.hidden=list.length!==0}
    function currentFilter(){const a=[...chips.querySelectorAll('.chip')].find(c=>c.classList.contains('active'));return a?a.dataset.filter:'all'}
    function apply(){
      const f=currentFilter();
      const term=q.value.trim().toLowerCase();
      const out=data.filter(p=>{
        const okType=f==='all'||p.type===f;
        const okText=term===''||(`${p.name} ${p.desc} ${p.tags.join(' ')}`.toLowerCase().includes(term));
        return okType&&okText;
      });
      render(out);
    }

    chips.addEventListener('click',e=>{const c=e.target.closest('.chip');if(!c)return;chips.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));c.classList.add('active');apply()})
    q.addEventListener('input',apply)
    mode.addEventListener('click',toggleMode)

    loadMode();apply()
  </script>
</body>
</html>
